spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/hackkosice
    username: hackkosice
    password: hackkosice
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: change-this-to-a-long-random-secret-key-with-at-least-32-characters
    expiration-ms: 86400000