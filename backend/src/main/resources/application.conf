ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.equipay.api.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/equipay"
    url = ${?DB_URL}
    user = "equipay"
    user = ${?DB_USER}
    password = "equipay_dev_pwd"
    password = ${?DB_PASSWORD}
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

email {
    provider = "smtp"
    provider = ${?EMAIL_PROVIDER}

    resendApiKey = ""
    resendApiKey = ${?RESEND_API_KEY}

    smtpHost = "localhost"
    smtpHost = ${?SMTP_HOST}

    smtpPort = 1025
    smtpPort = ${?SMTP_PORT}

    smtpUser = ""
    smtpUser = ${?SMTP_USER}

    smtpPassword = ""
    smtpPassword = ${?SMTP_PASSWORD}

    from = "onboarding@resend.dev"
    from = ${?EMAIL_FROM}

    fromName = "EquiPay"
    fromName = ${?EMAIL_FROM_NAME}
}

jwt {
    secret = "change_me_in_production_32chars_min!!"
    secret = ${?JWT_SECRET}
    issuer = "equipay-api"
    issuer = ${?JWT_ISSUER}
    accessTtlMin = 15
    accessTtlMin = ${?JWT_ACCESS_TTL_MIN}
    refreshTtlDays = 30
    refreshTtlDays = ${?JWT_REFRESH_TTL_DAYS}
}

openRouter {
    apiKey = ""
    apiKey = ${?OPENROUTER_API_KEY}
    baseUrl = "https://openrouter.ai/api/v1"
    baseUrl = ${?OPENROUTER_BASE_URL}
    model = "google/gemini-2.5-flash"
    model = ${?OPENROUTER_MODEL}
}

tatraBank {
    clientId = ""
    clientId = ${?TATRA_CLIENT_ID}
    clientSecret = ""
    clientSecret = ${?TATRA_CLIENT_SECRET}
    redirectUri = "http://localhost:8080/banks/tatra/callback"
    redirectUri = ${?TATRA_REDIRECT_URI}
    baseUrl = "https://api.tatrabanka.sk/premium/sandbox/v2"
    baseUrl = ${?TATRA_BASE_URL}
    sandboxMode = true
    sandboxMode = ${?TATRA_SANDBOX}
}